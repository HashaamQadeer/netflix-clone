<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix - Create a password</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            netflixRed: '#E50914',
            netflixRedHover: '#C11119',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../src/styles/styles.css">
</head>
<body class="bg-white text-[#333] font-sans antialiased min-h-screen flex flex-col">

  <header class="bg-white border-b border-gray-200 py-4 px-6 md:px-12 flex justify-between items-center h-[90px]">
    <a href="../index.html">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix Logo" class="w-32 md:w-44">
    </a>
    <a href="login.html" class="text-[#333] font-bold text-lg md:text-xl hover:underline text-decoration-none">Sign In</a>
  </header>

  <main class="flex-grow flex justify-center items-start px-4 py-12 md:py-20">
    <div class="max-w-[440px] w-full flex flex-col">
      
      <span class="text-[13px] uppercase tracking-wide mb-1 block text-left">Step <span class="font-bold">2</span> of <span class="font-bold">3</span></span>
      
      <h1 class="text-[32px] font-bold mb-4 leading-tight text-black text-left">Create a password to start your membership</h1>
      <p class="text-[18px] mb-2 text-[#333] leading-snug text-left">Just a few more steps and you're done!</p>
      <p class="text-[18px] mb-6 text-[#333] leading-snug text-left">We hate paperwork, too.</p>
      
      <form id="regForm" class="flex flex-col gap-4">
        
        <div class="flex flex-col w-full mb-2">
          <div class="relative w-full">
            <input type="email" id="email" required
              class="peer w-full h-[60px] px-4 pt-5 pb-1 border border-gray-400 rounded-sm text-black text-lg outline-none focus:border-blue-600 transition-all placeholder-transparent" 
              placeholder="Email">
            
            <label for="email" 
              class="absolute left-4 top-4 text-gray-500 transition-all pointer-events-none
              peer-placeholder-shown:top-4 peer-placeholder-shown:text-lg 
              peer-focus:top-1 peer-focus:text-xs
              peer-[:not(:placeholder-shown)]:top-1 peer-[:not(:placeholder-shown)]:text-xs">
              Email
            </label>
          </div>
        </div>

        <div class="relative w-full group">
          <input type="password" id="password" required minlength="6"
            class="peer w-full h-[60px] px-4 pt-5 pb-1 border border-gray-400 rounded-sm text-black text-lg outline-none focus:border-blue-600 transition-all placeholder-transparent" 
            placeholder="Add a password">
          <label for="password" 
            class="absolute left-4 top-4 text-gray-500 transition-all pointer-events-none
            peer-placeholder-shown:top-4 peer-placeholder-shown:text-lg 
            peer-focus:top-1 peer-focus:text-xs
            peer-[:not(:placeholder-shown)]:top-1 peer-[:not(:placeholder-shown)]:text-xs">
            Add a password
          </label>
        </div>

        <div class="flex items-center gap-3 py-2">
          <input type="checkbox" id="optOut" class="w-6 h-6 border-gray-400 rounded-sm accent-blue-600 cursor-pointer">
          <label for="optOut" class="text-[16px] text-[#333] cursor-pointer">Please do not email me Netflix special offers.</label>
        </div>
        
        <button type="submit" class="w-full bg-netflixRed hover:bg-netflixRedHover text-white text-2xl font-medium py-4 rounded-sm mt-4 transition duration-200">
          Next
        </button>
      </form>

    </div>
  </main>

  <footer class="bg-[#f3f3f3] border-t border-gray-200 text-[#737373] py-12 px-6 md:px-12 text-[13px] mt-auto">
    <div class="max-w-5xl mx-auto">
      <p class="mb-6">Questions? <a href="#" class="hover:underline">Contact us.</a></p>
      
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <a href="#" class="hover:underline text-decoration-none">FAQ</a>
        <a href="#" class="hover:underline text-decoration-none">Help Center</a>
        <a href="#" class="hover:underline text-decoration-none">Terms of Use</a>
        <a href="#" class="hover:underline text-decoration-none">Privacy</a>
        <a href="#" class="hover:underline text-decoration-none">Cookie Preferences</a>
        <a href="#" class="hover:underline text-decoration-none">Corporate Information</a>
      </div>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBgyXhZpm2FMhG2-VJAQdA8zsPU7Sx7CzY",
      authDomain: "netflix-clone-83442.firebaseapp.com",
      projectId: "netflix-clone-83442",
      storageBucket: "netflix-clone-83442.firebasestorage.app",
      messagingSenderId: "687029861226",
      appId: "1:687029861226:web:0e0e9e76f78d6a8f9a4313",
      measurementId: "G-DV9G0CHV7K"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Get HTML Elements
    const regForm = document.getElementById('regForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    // Handle Form Submission
    regForm.addEventListener('submit', (e) => {
      e.preventDefault(); // Stop standard HTML form submission

      const email = emailInput.value;
      const password = passwordInput.value;

      // Create user in Firebase
      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          // Success
          console.log("Registration Successful!", userCredential.user.email);
          // Redirect to browse page (or payment page depending on your flow)
          window.location.href = "../browse.html";
        })
        .catch((error) => {
          // Handle Errors
          if (error.code === 'auth/email-already-in-use') {
            alert('This email is already registered. Please Sign In.');
          } else if (error.code === 'auth/weak-password') {
            alert('Password should be at least 6 characters.');
          } else {
            alert('Error: ' + error.message);
          }
        });
    });
  </script>

</body>
</html>
