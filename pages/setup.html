<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix - Finish setting up your account</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            netflixRed: '#E50914',
            netflixRedHover: '#C11119',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../src/styles/styles.css">
</head>
<body class="bg-white text-[#333] font-sans antialiased min-h-screen flex flex-col">

  <header class="bg-white border-b border-gray-200 py-4 px-6 md:px-12 flex justify-between items-center h-[90px]">
    <a href="../index.html">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix Logo" class="w-32 md:w-44">
    </a>
    
    <a href="login.html" class="text-[#333] font-bold text-lg md:text-xl hover:underline text-decoration-none">Sign In</a>
  </header>

  <main class="flex-grow flex justify-center items-center px-4 py-8">
    <div class="max-w-[340px] w-full flex flex-col text-center md:text-left">
      
      <div class="mb-6 flex justify-center md:justify-start">
        <svg width="260" height="90" viewBox="0 0 260 90" fill="none" class="w-[200px] md:w-[260px] h-auto">
          <rect x="10" y="40" width="50" height="30" rx="2" stroke="#E50914" stroke-width="2"/>
          <line x1="0" y1="75" x2="70" y2="75" stroke="#E50914" stroke-width="4" stroke-linecap="round"/>
          <line x1="25" y1="70" x2="45" y2="70" stroke="#E50914" stroke-width="2"/>
          
          <rect x="85" y="15" width="80" height="50" rx="3" stroke="#E50914" stroke-width="2"/>
          <line x1="110" y1="65" x2="140" y2="65" stroke="#E50914" stroke-width="2"/>
          <line x1="125" y1="65" x2="125" y2="75" stroke="#E50914" stroke-width="2"/>
          <line x1="105" y1="75" x2="145" y2="75" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
          
          <rect x="185" y="30" width="30" height="45" rx="3" stroke="#E50914" stroke-width="2"/>
          <circle cx="200" cy="70" r="1.5" fill="#E50914"/>
          
          <rect x="225" y="45" width="16" height="30" rx="2" stroke="#E50914" stroke-width="2"/>
          <circle cx="233" cy="71" r="1" fill="#E50914"/>
        </svg>
      </div>
      
      <span class="text-[13px] uppercase tracking-wide mb-1">Step <span class="font-bold">2</span> of <span class="font-bold">3</span></span>
      
      <h1 class="text-[32px] font-bold mb-4 leading-tight text-black">Finish setting up your account</h1>
      
      <p class="text-[18px] mb-6 text-[#333] leading-snug">
        Netflix is personalized for you. Create a password to watch on any device at any time.
      </p>
      
      <a href="regform.html" class="w-full bg-netflixRed hover:bg-netflixRedHover text-white text-2xl font-medium py-4 rounded text-center transition duration-200 text-decoration-none">
        Next
      </a>

    </div>
  </main>

  <footer class="bg-[#f3f3f3] border-t border-gray-200 text-[#737373] py-8 px-6 md:px-12 text-[13px] mt-auto">
    <div class="max-w-5xl mx-auto">
      <p class="mb-6">Questions? <a href="#" class="hover:underline">Contact us.</a></p>
      
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <a href="#" class="hover:underline">FAQ</a>
        <a href="#" class="hover:underline">Help Center</a>
        <a href="#" class="hover:underline">Terms of Use</a>
        <a href="#" class="hover:underline">Privacy</a>
        <a href="#" class="hover:underline">Cookie Preferences</a>
        <a href="#" class="hover:underline">Corporate Information</a>
      </div>
    </div>
  </footer>

</body>
</html>
